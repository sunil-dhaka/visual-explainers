<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual Explainers</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+CjxjaXJjbGUgY3g9IjE2IiBjeT0iMTYiIHI9IjE1IiBmaWxsPSIjMGIwZDEyIi8+CjxlbGxpcHNlIGN4PSIxNiIgY3k9IjE2IiByeD0iMTIiIHJ5PSI3IiBmaWxsPSJub25lIiBzdHJva2U9IiM1OWMzYzMiIHN0cm9rZS13aWR0aD0iMS44Ii8+CjxjaXJjbGUgY3g9IjE2IiBjeT0iMTYiIHI9IjQiIGZpbGw9IiM1OWMzYzMiLz4KPGNpcmNsZSBjeD0iMTYiIGN5PSIxNiIgcj0iMS41IiBmaWxsPSIjMGIwZDEyIi8+Cjwvc3ZnPg==">
  <link rel="alternate" type="application/rss+xml" title="Visual Explainers RSS" href="https://sunil-dhaka.github.io/visual-explainers/feed.xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0d12;
      --panel: #161b2b;
      --panel-strong: #1f2538;
      --text: #f4f1ec;
      --muted: #b3b1ac;
      --accent: #59c3c3;
      --warm: #f4a261;
      --red: #e76f51;
      --green: #2a9d8f;
      --purple: #9d8df1;
      --line: rgba(244, 241, 236, 0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(11, 13, 18, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
      padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 56px;
    }
    nav .site-name {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--accent);
      text-decoration: none;
    }
    nav .nav-right a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    nav .nav-right a:hover { color: var(--accent); }

    /* CONTAINER */
    .container { max-width: 1100px; margin: 0 auto; padding: 0 2rem; }

    /* HERO */
    .hero {
      padding: 4rem 0 2.5rem;
      text-align: center;
      border-bottom: 1px solid var(--line);
      margin-bottom: 2.5rem;
    }
    .hero h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
    }
    .hero .subtitle {
      color: var(--muted);
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }

    /* SEARCH */
    .search-container {
      max-width: 480px;
      margin: 0 auto 1rem;
    }
    #search {
      width: 100%;
      padding: 0.75rem 1.2rem;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #search::placeholder { color: var(--muted); opacity: 0.6; }
    #search:focus { border-color: var(--accent); }

    .count {
      color: var(--muted);
      font-size: 0.85rem;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.5rem;
      padding-bottom: 4rem;
    }

    /* CARDS */
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .card:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
      box-shadow: 0 8px 30px rgba(89, 195, 195, 0.1);
    }
    .card-accent {
      height: 5px;
      width: 100%;
    }
    .card-body {
      padding: 1.4rem 1.4rem 1.2rem;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .card-title {
      font-family: 'Fraunces', serif;
      font-size: 1.2rem;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 0.6rem;
    }
    .card-desc {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.6;
      flex: 1;
      margin-bottom: 1rem;
    }
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .card-date {
      font-size: 0.8rem;
      color: var(--muted);
      opacity: 0.7;
    }
    .card-tags {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .pill {
      font-size: 0.7rem;
      font-weight: 500;
      padding: 0.15rem 0.55rem;
      border-radius: 20px;
      border: 1px solid;
      opacity: 0.8;
    }
    .pill-accent  { color: var(--accent); border-color: var(--accent); }
    .pill-warm    { color: var(--warm);   border-color: var(--warm); }
    .pill-green   { color: var(--green);  border-color: var(--green); }
    .pill-purple  { color: var(--purple); border-color: var(--purple); }
    .pill-red     { color: var(--red);    border-color: var(--red); }

    /* NO RESULTS */
    .no-results {
      text-align: center;
      color: var(--muted);
      padding: 3rem 0;
      font-size: 0.95rem;
      display: none;
    }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--line);
      padding: 1.5rem 0;
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      nav { padding: 0 1rem; }
      .container { padding: 0 1rem; }
      .hero { padding: 2.5rem 0 1.5rem; }
      .hero h1 { font-size: 1.8rem; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="./" class="site-name">Visual Explainers</a>
    <div class="nav-right">
      <a href="https://github.com/sunil-dhaka/visual-explainers">GitHub</a>
    </div>
  </nav>

  <div class="container">
    <div class="hero">
      <h1>Visual Explainers</h1>
      <p class="subtitle">Complex topics, explained visually</p>
      <div class="search-container">
        <input type="text" id="search" placeholder="Search explainers...">
      </div>
      <p class="count" id="count"></p>
    </div>
    <div id="grid" class="grid"></div>
    <p class="no-results" id="no-results">No explainers match your search.</p>
  </div>

  <footer>
    <div class="container">
      <a href="https://sunil-dhaka.github.io/">blog</a> &middot;
      <a href="https://github.com/sunil-dhaka/visual-explainers">source</a> &middot;
      <a href="feed.xml" style="color:var(--warm)">rss feed</a>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
